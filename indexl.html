<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Remove Vietnam Code 84</title>
<style>
body{
font-family: Arial;
background:#111;
color:#fff;
text-align:center;
padding:40px;
}
button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Vietnam Number Converter</h2>
<p>Upload TXT → Remove +84 / 84 → Download</p>

<input type="file" id="fileInput">
<br><br>
<button onclick="processFile()">Convert</button>

<script>

function processFile(){

let file = document.getElementById("fileInput").files[0];

if(!file){
alert("Upload file dulu");
return;
}

let reader = new FileReader();

reader.onload = function(e){

let lines = e.target.result.split(/\r?\n/);
let output = [];

lines.forEach(num => {

num = num.replace(/\D/g,'');

if(num.startsWith("84")){
num = num.substring(2);
}

if(num.length > 0){
output.push(num);
}

});

let blob = new Blob([output.join("\n")], {type:"text/plain"});

let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "hasil_nomor.txt";
a.click();

};

reader.readAsText(file);

}

</script>

</body>
</html>
